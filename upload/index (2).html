<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilihan Raya Monopoly 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    #board-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #ui-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }
    #ui-overlay .ticker {
      font-size: 14px;
      color: #f1c40f;
      font-family: monospace;
    }
    #controls {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    button {
      background: linear-gradient(135deg, #D4AF37, #B8860B);
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      color: #1a1a1a;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      pointer-events: all;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
    }
    #card-detail {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 280px;
      background: rgba(10, 10, 30, 0.95);
      border: 1px solid #D4AF37;
      border-radius: 12px;
      padding: 20px;
      display: none;
      z-index: 10;
    }
    #card-detail h3 {
      color: #D4AF37;
      margin-bottom: 12px;
      font-size: 20px;
    }
    #card-detail .rent-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #333;
      font-size: 14px;
    }
    #card-detail .rent-row span:last-child {
      color: #f1c40f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="board-container"></div>

  <div id="ui-overlay">
    <div class="ticker">
      🇲🇾 BURSA: KLCI 1588.0 ▲0.2% | CPO RM3959 ▲1.0% | MYR 4.47 ▼0.9% | INF 4.0%
    </div>
    <div style="color: #888; font-size: 12px;">Pilihan Raya Edition v3.0</div>
  </div>

  <div id="controls">
    <button onclick="demoPurchase()">🛒 Beli Perlis (PH)</button>
    <button onclick="demoBuild()">🏗️ Bina Cawangan</button>
    <button onclick="demoMonopoly()">👑 Monopoly!</button>
    <button onclick="demoMortgage()">🏦 Hipotek</button>
  </div>

  <div id="card-detail">
    <h3 id="detail-name">Nama Hartanah</h3>
    <div id="detail-content"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/": "https://unpkg.com/three@0.160.0/",
      "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js",
      "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>

  <script type="module">
    import { CardBoard } from './CardBoard.js';

    // Fetch card data
    const response = await fetch('./pilihan_raya_cards.json');
    const schema = await response.json();

    // Initialize board
    const container = document.getElementById('board-container');
    const board = new CardBoard(container, schema.cards);

    // Expose for demo buttons
    window.board = board;
    window.schema = schema;

    // Tile selection handler
    window.addEventListener('tileSelected', (e) => {
      const data = e.detail;
      const detail = document.getElementById('card-detail');
      const name = document.getElementById('detail-name');
      const content = document.getElementById('detail-content');

      name.textContent = data.name;
      content.innerHTML = '';

      if (data.rentTable) {
        const labels = ['Kosong', '1 Cawangan', '2 Cawangan', '3 Cawangan', '4 Cawangan', 'Markas'];
        data.rentTable.forEach((rent, i) => {
          const row = document.createElement('div');
          row.className = 'rent-row';
          row.innerHTML = `<span>${labels[i]}</span><span>RM${rent}</span>`;
          content.appendChild(row);
        });
      }

      detail.style.display = 'block';
      setTimeout(() => { detail.style.display = 'none'; }, 5000);
    });

    // Demo functions
    window.demoPurchase = () => {
      board.purchaseTile(1, 'PH');
      console.log('PH membeli Perlis!');
    };

    window.demoBuild = () => {
      board.buildOnTile(1, 2);
      console.log('Membina 2 cawangan di Perlis');
    };

    window.demoMonopoly = () => {
      board.purchaseTile(3, 'PH');
      setTimeout(() => board.achieveMonopoly([1, 3]), 1000);
      console.log('PH mencapai Monopoly Tanah Murah!');
    };

    window.demoMortgage = () => {
      board.mortgageTile(1);
      console.log('Perlis dihipotekkan');
    };
  </script>
</body>
</html>
