name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build with OpenNext for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Check Cloudflare secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "⚠️ CLOUDFLARE_API_TOKEN not set — skipping deploy. Build succeeded."
          else
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.secrets.outputs.has_secrets == 'true'
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Skip deploy (no secrets)
        if: steps.secrets.outputs.has_secrets != 'true'
        run: echo "✅ Build succeeded. Deploy skipped — add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to GitHub Secrets to enable auto-deploy."
