<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dewan Rakyat: Pilihan Raya Edition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0f1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .loader { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(250,204,21,0.3); border-top-color: rgba(250,204,21,0.9); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.5rem; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.875rem; max-width: 320px; text-align: center; line-height: 1.5; }
    .retry { margin-top: 1.5rem; padding: 0.75rem 2rem; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; border: none; border-radius: 0.5rem; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
    .retry:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(250,204,21,0.3); }
    .hidden { display: none; }
    #game-root { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <h1>DEWAN RAKYAT</h1>
    <p>Loading Pilihan Raya Edition...</p>
    <button class="retry hidden" id="retry" onclick="loadGame()">Retry Connection</button>
  </div>
  <div id="game-root"></div>
  <script>
    const API_PORT = 3000;
    let retries = 0;
    const maxRetries = 3;

    function loadGame() {
      const loader = document.getElementById('loader');
      const retryBtn = document.getElementById('retry');
      loader.style.display = 'flex';
      retryBtn.classList.add('hidden');
      
      fetch(`http://localhost:${API_PORT}/`)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.text();
        })
        .then(html => {
          const root = document.getElementById('game-root');
          root.innerHTML = html;
          // Load and execute scripts
          const scripts = root.querySelectorAll('script[src]');
          scripts.forEach(s => {
            const ns = document.createElement('script');
            ns.src = s.src;
            document.head.appendChild(ns);
            s.remove();
          });
          // Load stylesheets
          const styles = root.querySelectorAll('link[rel="stylesheet"]');
          styles.forEach(s => document.head.appendChild(s.cloneNode(true)));
          // Load inline scripts
          const inlineScripts = root.querySelectorAll('script:not([src])');
          inlineScripts.forEach(s => {
            const ns = document.createElement('script');
            ns.textContent = s.textContent;
            document.head.appendChild(ns);
            s.remove();
          });
          loader.style.display = 'none';
        })
        .catch(err => {
          console.error('Failed to load game:', err);
          retries++;
          if (retries < maxRetries) {
            loader.querySelector('p').textContent = `Connection failed (${err.message}). Retrying ${retries}/${maxRetries}...`;
            retryBtn.classList.remove('hidden');
            retryBtn.textContent = `Retry (${retries}/${maxRetries})`;
            retryBtn.onclick = loadGame;
          } else {
            loader.querySelector('p').textContent = 'Unable to connect. Game server may be starting up...';
            retryBtn.classList.remove('hidden');
            retryBtn.textContent = 'Refresh Page';
          }
        });
    }

    // Auto-load
    loadGame();
    // Refresh every 60s to handle server restarts
    setInterval(loadGame, 60000);
  </script>
</body>
</html>
